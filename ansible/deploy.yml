---
- name: Deploy Dherta AI Service
  hosts: production
  become: true
  gather_facts: yes

  vars:
    docker_apt_key: "https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg"
    docker_apt_repo: "deb [arch={{ 'amd64' if ansible_architecture == 'x86_64' else 'arm64' }} signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/{{ ansible_distribution | lower }} {{ ansible_distribution_release }} stable"

  pre_tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required system packages
      apt:
        name:
          - curl
          - wget
          - ca-certificates
          - gnupg
          - lsb-release
          - python3-pip
          - jq
        state: present

  tasks:
    # ── Docker Installation ──────────────────────────────────
    - name: Check if Docker is installed
      command: docker --version
      register: docker_check
      ignore_errors: yes
      changed_when: false

    - name: Docker installation block
      block:
        - name: Add Docker GPG key
          shell: |
            curl -fsSL {{ docker_apt_key }} | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
          creates: /etc/apt/keyrings/docker.gpg

        - name: Add Docker repository
          lineinfile:
            path: /etc/apt/sources.list.d/docker.list
            line: "{{ docker_apt_repo }}"
            create: yes

        - name: Update apt cache after adding Docker repo
          apt:
            update_cache: yes

        - name: Install Docker
          apt:
            name:
              - docker-ce
              - docker-ce-cli
              - containerd.io
              - docker-compose-plugin
            state: present

        - name: Start and enable Docker service
          systemd:
            name: docker
            state: started
            enabled: yes

      when: docker_check.rc != 0
      tags: docker

    - name: Verify Docker installation
      command: docker --version
      register: docker_version
      changed_when: false

    - name: Display Docker version
      debug:
        msg: "Docker installed: {{ docker_version.stdout }}"

    # ── Docker Compose Installation ──────────────────────────
    - name: Check Docker Compose version
      command: docker compose version
      register: compose_check
      ignore_errors: yes
      changed_when: false

    - name: Setup Docker Compose
      block:
        - name: Create /usr/local/lib/docker/cli-plugins directory
          file:
            path: /usr/local/lib/docker/cli-plugins
            state: directory
            mode: '0755'

        - name: Install docker-compose
          shell: |
            curl -L "https://github.com/docker/compose/releases/download/{{ docker_compose_version }}/docker-compose-$(uname -s)-$(uname -m)" \
              -o /usr/local/bin/docker-compose
            chmod +x /usr/local/bin/docker-compose

      when: compose_check.rc != 0 or docker_compose_version not in compose_check.stdout
      tags: docker-compose

    # ── Deployment User Setup ───────────────────────────────
    - name: Create deployment user
      user:
        name: "{{ deployment_user }}"
        home: "{{ deployment_home }}"
        shell: /bin/bash
        state: present

    - name: Add deployment user to docker group
      user:
        name: "{{ deployment_user }}"
        groups: docker
        append: yes

    - name: Create deployment directories
      file:
        path: "{{ item }}"
        state: directory
        owner: "{{ deployment_user }}"
        group: "{{ deployment_user }}"
        mode: '0755'
      loop:
        - "{{ deployment_home }}/{{ project_name }}"
        - "{{ deployment_home }}/{{ project_name }}/docker"


    # ── Generate Configuration Files from Templates ─────────
    - name: Generate docker-compose.yml from template
      template:
        src: docker-compose.yml.j2
        dest: "{{ deployment_home }}/{{ project_name }}/docker/docker-compose.yml"
        owner: "{{ deployment_user }}"
        group: "{{ deployment_user }}"
        mode: '0644'
      tags: config

    - name: Generate Caddyfile from template
      template:
        src: Caddyfile.j2
        dest: "{{ deployment_home }}/{{ project_name }}/docker/Caddyfile"
        owner: "{{ deployment_user }}"
        group: "{{ deployment_user }}"
        mode: '0644'
      tags: config

    - name: Copy init.sql to deployment directory
      copy:
        src: init.sql
        dest: "{{ deployment_home }}/{{ project_name }}/docker/init.sql"
        owner: "{{ deployment_user }}"
        group: "{{ deployment_user }}"
        mode: '0644'
      tags: config

    - name: Generate .env file from group variables
      template:
        src: .env.j2
        dest: "{{ deployment_home }}/{{ project_name }}/docker/.env"
        owner: "{{ deployment_user }}"
        group: "{{ deployment_user }}"
        mode: '0600'
      tags: config
      vars:
        template_src: |
          DOMAIN={{ domain }}
          APP_NAME={{ app_name }}
          APP_VERSION={{ app_version }}
          DEBUG={{ debug }}
          LOG_RESULTS={{ log_results }}
          RUN_SEEDS={{ run_seeds }}
          HOST=0.0.0.0
          PORT=8000
          GRPC_PORT=50051
          AWS_ACCESS_KEY_ID={{ minio_root_user }}
          AWS_SECRET_ACCESS_KEY={{ minio_root_password }}
          AWS_REGION={{ aws_region }}
          AWS_S3_BUCKET={{ aws_s3_bucket }}
          AWS_S3_ENDPOINT_URL=http://minio:9000
          AWS_S3_PUBLIC_URL={{ aws_s3_public_url }}
          LLM_PROVIDER={{ llm_provider }}
          LLM_MODEL={{ llm_model }}
          LLM_EMBEDDING_MODEL={{ llm_embedding_model }}
          LLM_EMBEDDING_DIMENSION={{ llm_embedding_dimension }}
          LLM_API_KEY={{ llm_api_key }}
          OCR_PROVIDER={{ ocr_provider }}
          OCR_LANG={{ ocr_lang }}
          OCR_USE_GPU={{ ocr_use_gpu }}
          JWT_SECRET_KEY={{ jwt_secret_key }}
          JWT_ALGORITHM={{ jwt_algorithm }}
          ACCESS_TOKEN_EXPIRE_MINUTES={{ access_token_expire_minutes }}
          REFRESH_TOKEN_EXPIRE_DAYS={{ refresh_token_expire_days }}
          CORS_ORIGINS={{ cors_origins }}
          CORS_ALLOW_CREDENTIALS={{ cors_allow_credentials }}
          CORS_ALLOW_METHODS={{ cors_allow_methods }}
          CORS_ALLOW_HEADERS={{ cors_allow_headers }}
          SMTP_HOST={{ smtp_host }}
          SMTP_PORT={{ smtp_port }}
          SMTP_USERNAME={{ smtp_username }}
          SMTP_PASSWORD={{ smtp_password }}
          SMTP_FROM_EMAIL={{ smtp_from_email }}
          SMTP_FROM_NAME={{ smtp_from_name }}
          KAFKA_CONSUMER_GROUP_ID=dherta-ai-service
          KAFKA_CONSUMER_AUTO_OFFSET_RESET=earliest
          QUESTION_GROUPING_THRESHOLD={{ question_grouping_threshold }}

    # ── Docker Registry Login ────────────────────────────────
    - name: Login to Docker registry
      shell: |
        echo "{{ docker_password }}" | docker login -u {{ docker_username }} --password-stdin {{ docker_registry }}
      when: docker_username != "" and docker_password != ""
      no_log: true
      tags: registry

    # ── Pull Images ──────────────────────────────────────────
    - name: Pull Docker images
      shell: |
        cd {{ deployment_home }}/{{ project_name }}/docker
        docker pull {{ backend_image }}
        docker pull {{ frontend_image }}
      become_user: "{{ deployment_user }}"
      tags: images

    # ── Run Setup Profile (Download models, browsers) ────────
    - name: Run Docker Compose setup profile
      shell: |
        cd {{ deployment_home }}/{{ project_name }}/docker
        docker compose --profile setup up
      become_user: "{{ deployment_user }}"
      tags: setup
      register: setup_result
      async: 3600
      poll: 30

    - name: Display setup output
      debug:
        msg: "{{ setup_result.stdout }}"

    # ── Start Full Stack ─────────────────────────────────────
    - name: Start Docker Compose services
      shell: |
        cd {{ deployment_home }}/{{ project_name }}/docker
        docker compose up -d
      become_user: "{{ deployment_user }}"
      tags: deploy

    - name: Wait for services to be healthy
      shell: |
        cd {{ deployment_home }}/{{ project_name }}/docker
        docker compose ps
      become_user: "{{ deployment_user }}"
      register: compose_status
      until: compose_status.stdout.find("healthy") != -1 or compose_status.stdout.find("Up") != -1
      retries: 10
      delay: 10
      tags: deploy

    - name: Display service status
      debug:
        msg: "{{ compose_status.stdout }}"

    # ── Verification ─────────────────────────────────────────
    - name: Verify API health
      uri:
        url: "http://localhost:8000/health"
        method: GET
      register: api_health
      until: api_health.status == 200
      retries: 10
      delay: 5
      tags: verify

    - name: Display API health status
      debug:
        msg: "API Health Check: {{ api_health.json }}"

  post_tasks:
    - name: Display deployment summary
      debug:
        msg: |
          ═══════════════════════════════════════════════════════
          ✓ Deployment Complete!
          ═══════════════════════════════════════════════════════
          Project: {{ project_name }}
          Domain: {{ domain }}
          Services: Running
          Location: {{ deployment_home }}/{{ project_name }}
          
          Access Points:
          - API: https://{{ domain }}/api
          - Frontend: https://{{ domain }}
          - MinIO Console: https://{{ domain }}/minio/
          
          Common Commands:
          cd {{ deployment_home }}/{{ project_name }}/docker
          docker compose logs -f api
          docker compose ps
          docker compose down
          ═══════════════════════════════════════════════════════

  handlers:
    - name: Restart Docker
      systemd:
        name: docker
        state: restarted
