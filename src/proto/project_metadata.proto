syntax = "proto3";

package project_metadata;

import "common.proto";

option go_package = "github.com/example/fastapi-grpc/project_metadata";

message ProjectMetadataRequest {
    string name = 1;
    string description = 2;
    string version = 3;
}

message ProjectMetadataResponse {
    string id = 1;
    string name = 2;
    string description = 3;
    string version = 4;
    int64 created_at_seconds = 5;
    int32 created_at_nanos = 6;
    int64 updated_at_seconds = 7;
    int32 updated_at_nanos = 8;
}

message ProjectMetadataUpdateRequest {
    string id = 1;
    string name = 2;
    string description = 3;
    string version = 4;
}

message ProjectMetadataIdRequest {
    string id = 1;
}

message ProjectMetadataListResponse {
    repeated ProjectMetadataResponse projects = 1;
}

service ProjectMetadataService {
    rpc CreateProject(ProjectMetadataRequest) returns (ProjectMetadataResponse);
    rpc GetProject(ProjectMetadataIdRequest) returns (ProjectMetadataResponse);
    rpc ListProjects(common.Empty) returns (ProjectMetadataListResponse);
    rpc UpdateProject(ProjectMetadataUpdateRequest) returns (ProjectMetadataResponse);
    rpc DeleteProject(ProjectMetadataIdRequest) returns (common.Empty);
}
